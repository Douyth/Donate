<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: 'Sarabun', sans-serif;
    overflow: hidden;
    width: 800px;
    height: 250px;
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    padding: 24px;
  }

  .alert-box {
    display: none;
    align-items: center;
    gap: 20px;
    background: linear-gradient(135deg, rgba(20,20,30,0.97), rgba(30,30,45,0.97));
    border: 1.5px solid rgba(0,229,160,0.5);
    border-radius: 20px;
    padding: 20px 28px;
    max-width: 750px;
    width: 100%;
    box-shadow: 0 0 40px rgba(0,229,160,0.2), 0 12px 40px rgba(0,0,0,0.6);
    animation: slideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  .alert-box.show { display: flex; }
  .alert-box.hide { animation: slideOut 0.4s ease forwards; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-50px) scale(0.93); }
    to   { opacity: 1; transform: translateX(0) scale(1); }
  }
  @keyframes slideOut {
    from { opacity: 1; transform: translateX(0) scale(1); }
    to   { opacity: 0; transform: translateX(-50px) scale(0.93); }
  }

  .alert-icon {
    width: 64px; height: 64px;
    background: rgba(0,229,160,0.15);
    border: 1.5px solid rgba(0,229,160,0.35);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
    flex-shrink: 0;
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,229,160,0.35); }
    50% { box-shadow: 0 0 0 10px rgba(0,229,160,0); }
  }

  .alert-content { flex: 1; min-width: 0; }

  .alert-header {
    font-size: 12px;
    color: #00e5a0;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 700;
  }

  .alert-name {
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .alert-msg {
    font-size: 16px;
    color: rgba(255,255,255,0.75);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .alert-amount {
    text-align: center;
    flex-shrink: 0;
  }

  .amount-value {
    font-size: 30px;
    font-weight: 800;
    color: #00e5a0;
    line-height: 1;
  }

  .amount-unit {
    font-size: 13px;
    color: rgba(0,229,160,0.7);
    margin-top: 2px;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="alert-box" id="alertBox">
  <div class="alert-icon">💜</div>
  <div class="alert-content">
    <div class="alert-header">✦ โดเนทใหม่!</div>
    <div class="alert-name" id="alertName">Anonymous</div>
    <div class="alert-msg" id="alertMsg">ขอบคุณครับ!</div>
  </div>
  <div class="alert-amount">
    <div class="amount-value" id="alertAmount">0</div>
    <div class="amount-unit">บาท</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    databaseURL: "https://alert-2d2cf-default-rtdb.asia-southeast1.firebasedatabase.app"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let isFirstLoad = true;
  const queue = [];
  let isShowing = false;

  setTimeout(() => { isFirstLoad = false; }, 3000);

  onChildAdded(ref(db, 'donations'), (snapshot) => {
    if (isFirstLoad) return;
    const data = snapshot.val();
    queue.push(data);
    if (!isShowing) showNext();
  });

  function showNext() {
    if (queue.length === 0) { isShowing = false; return; }
    isShowing = true;
    const data = queue.shift();
    const box = document.getElementById('alertBox');
    document.getElementById('alertName').textContent = data.name || 'Anonymous';
    document.getElementById('alertMsg').textContent = data.message || '';
    document.getElementById('alertAmount').textContent = data.amount ? Number(data.amount).toLocaleString() : '0';
    box.classList.remove('hide');
    box.classList.add('show');

    setTimeout(() => {
      box.classList.add('hide');
      setTimeout(() => {
        box.classList.remove('show', 'hide');
        setTimeout(showNext, 500);
      }, 400);
    }, 7000);
  }
</script>
</body>
</html>
